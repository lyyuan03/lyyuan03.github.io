<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章後台｜靈元院</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap">
<style>
:root{--gold:#A58254;--cream:#F5F0E8;--ink:#17130d;--deep:#071106;--panel:#10180d;--line:rgba(165,130,84,.28);--muted:rgba(245,240,232,.68);--sans:'Noto Sans TC','Arial',sans-serif;--serif:'Noto Serif TC','Georgia',serif}
*{box-sizing:border-box}body{margin:0;background:#071106;color:var(--cream);font-family:var(--sans);line-height:1.75;letter-spacing:.04em}.admin-shell{min-height:100vh}.admin-top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 28px;background:rgba(7,17,6,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}.brand{display:flex;flex-direction:column;gap:2px}.brand strong{font-family:var(--serif);font-weight:500;font-size:20px;letter-spacing:.18em;color:var(--gold)}.brand span{font-size:12px;color:rgba(245,240,232,.55);letter-spacing:.16em}.top-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.admin-main{display:grid;grid-template-columns:minmax(260px,340px) 1fr;gap:24px;max-width:1280px;margin:0 auto;padding:28px}.panel{background:rgba(16,24,13,.94);border:1px solid var(--line);box-shadow:0 18px 60px rgba(0,0,0,.24)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(165,130,84,.18)}.panel-head h2{margin:0;font-family:var(--serif);font-weight:500;font-size:18px;letter-spacing:.14em}.article-list{max-height:calc(100vh - 164px);overflow:auto}.article-item{width:100%;display:block;text-align:left;padding:16px 18px;border:0;border-bottom:1px solid rgba(165,130,84,.14);background:transparent;color:var(--cream);cursor:pointer}.article-item:hover,.article-item.is-active{background:rgba(165,130,84,.1)}.article-item-title{font-size:15px;font-weight:500;margin-bottom:5px}.article-item-meta{font-size:12px;color:rgba(245,240,232,.48)}.editor{padding:22px;display:grid;gap:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{display:grid;gap:7px}.field label{font-size:13px;color:rgba(245,240,232,.72)}input,select,textarea{width:100%;border:1px solid rgba(165,130,84,.32);background:rgba(4,8,3,.62);color:var(--cream);font:inherit;padding:11px 12px;border-radius:0;outline:none}textarea{min-height:320px;resize:vertical;line-height:1.9}.content-preview{padding:18px;background:rgba(245,240,232,.06);border:1px solid rgba(165,130,84,.18);color:rgba(245,240,232,.8);max-height:360px;overflow:auto}.content-preview h1,.content-preview h2,.content-preview h3{font-family:var(--serif);color:var(--gold);font-weight:500}.content-preview p{margin:0 0 1em}.content-preview img{max-width:100%;height:auto;display:block;margin:18px auto;border:1px solid rgba(165,130,84,.18)}.editor-tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.upload-note{font-size:12px;color:rgba(245,240,232,.48)}.btn{border:1px solid rgba(165,130,84,.55);background:rgba(165,130,84,.11);color:#CBAA77;padding:10px 16px;font-family:var(--sans);font-size:14px;letter-spacing:.08em;cursor:pointer}.btn:hover{background:rgba(165,130,84,.2)}.btn.primary{background:rgba(165,130,84,.24);color:#F5F0E8}.btn.danger{border-color:rgba(180,90,78,.55);color:#e2a09a;background:rgba(180,90,78,.1)}.btn:disabled{opacity:.55;cursor:wait}.status{font-size:13px;color:rgba(245,240,232,.58)}.empty{padding:28px;color:rgba(245,240,232,.48);text-align:center}.gate{max-width:460px;margin:12vh auto;padding:40px 34px;text-align:center;background:rgba(16,24,13,.94);border:1px solid var(--line)}.gate h1{font-family:var(--serif);font-size:24px;font-weight:500;letter-spacing:.16em;color:var(--gold);margin:0 0 12px}.gate p{color:var(--muted);margin:0 0 24px}.hidden{display:none!important}@media(max-width:860px){.admin-main{grid-template-columns:1fr;padding:18px}.article-list{max-height:300px}.grid{grid-template-columns:1fr}.admin-top{align-items:flex-start;flex-direction:column}}
.metrics-box{border-bottom:1px solid rgba(165,130,84,.18);background:rgba(165,130,84,.035)}.metrics-head{padding:11px 18px 7px;font-size:11px;letter-spacing:.14em;color:rgba(203,170,119,.76)}.metrics-list{max-height:240px;overflow:auto;padding:0 12px 10px}.metrics-row{padding:9px 7px;border-bottom:1px solid rgba(165,130,84,.1)}.metrics-row:last-child{border-bottom:0}.metrics-title{font-size:12px;color:rgba(245,240,232,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metrics-values{display:flex;gap:10px;margin-top:3px;font-size:10px;color:rgba(245,240,232,.44)}.metrics-empty{padding:12px 7px;font-size:11px;color:rgba(245,240,232,.4)}
</style>
</head>
<body>
<div id="login-gate" class="gate">
  <h1>靈元院文章後台</h1>
  <p>請使用靈元院指定 Gmail 登入後，管理文章草稿與發布內容。</p>
  <button id="admin-login" class="btn primary" type="button">使用 Google 登入</button>
  <p id="gate-status" class="status"></p>
</div>

<div id="admin-app" class="admin-shell hidden">
  <header class="admin-top">
    <div class="brand">
      <strong>靈元院文章後台</strong>
      <span>ARTICLE MANAGEMENT</span>
    </div>
    <div class="top-actions">
      <span id="admin-user" class="status"></span>
      <button id="export-articles" class="btn" type="button">匯出全部文章</button>
      <span id="export-status" class="status" aria-live="polite"></span>
      <a class="btn" href="articles.html" target="_blank">查看前台文章</a>
      <a class="btn" href="index.html">回首頁</a>
      <button id="admin-logout" class="btn" type="button">登出</button>
    </div>
  </header>

  <main class="admin-main">
    <section class="panel">
      <div class="panel-head">
        <h2>文章列表</h2>
        <button id="new-article" class="btn" type="button">新增</button>
      </div>
      <div class="metrics-box">
        <div class="metrics-head">文章互動統計</div>
        <div id="article-metrics" class="metrics-list"><div class="metrics-empty">載入中…</div></div>
      </div>
      <div id="article-list" class="article-list"><div class="empty">載入中…</div></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>文章內容</h2>
        <span id="save-status" class="status"></span>
      </div>
      <form id="article-form" class="editor">
        <div class="grid">
          <div class="field">
            <label for="title">標題</label>
            <input id="title" name="title" required>
          </div>
          <div class="field">
            <label for="slug">網址代稱</label>
            <input id="slug" name="slug" placeholder="可留空，系統會依標題產生">
          </div>
          <div class="field">
            <label for="category">分類</label>
            <select id="category" name="category">
              <option value="spiritual">靈．修行</option>
              <option value="worldly">人．俗世</option>
              <option value="spirit-world">異．靈界</option>
              <option value="reading">思．讀物</option>
            </select>
          </div>
          <div class="field">
            <label for="status">狀態</label>
            <select id="status" name="status">
              <option value="draft">草稿</option>
              <option value="published">發布</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="excerpt">摘要</label>
          <textarea id="excerpt" name="excerpt" style="min-height:96px"></textarea>
        </div>

        <div class="field">
          <label for="coverImage">封面圖片網址</label>
          <input id="coverImage" name="coverImage" placeholder="https://...">
        </div>

        <div class="field">
          <label for="content">內文</label>
          <div class="editor-tools">
            <button id="upload-image" class="btn" type="button">插入圖片</button>
            <input id="image-input" type="file" accept="image/*" multiple hidden>
            <span id="upload-status" class="upload-note">可一次選擇多張圖片，系統會自動插入文章中。</span>
          </div>
          <textarea id="content" name="content" required></textarea>
        </div>

        <div class="field">
          <label>即時預覽</label>
          <div id="preview" class="content-preview"></div>
        </div>

        <div class="top-actions">
          <button id="save-article" class="btn primary" type="submit">儲存文章</button>
          <button id="delete-article" class="btn danger" type="button">刪除文章</button>
        </div>
      </form>
    </section>
  </main>
</div>

<script type="module" src="article-admin.js?v=20260722-article-metrics-1"></script>
</body>
</html>
