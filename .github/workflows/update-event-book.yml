name: Update event book
on:
  push:
    branches: [main]
    paths: ['.github/workflows/update-event-book.yml']
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch books page
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          html_path = Path('books.html')
          text = html_path.read_text(encoding='utf-8')

          replacements = {
            "ghost:['請問鬼怪','https://page.cashier.ecpay.com.tw/forms/b7KC',img+'001/102/93/0011029318.jpg']": "ghost:['請問鬼怪','https://www.books.com.tw/products/0011029318?sloc=main',img+'001/102/93/0011029318.jpg']",
            "event:['靈界事件簿','https://page.cashier.ecpay.com.tw/forms/b7KC',img+'001/070/96/0010709682.jpg']": "event:['靈界事件簿','https://www.books.com.tw/products/0010882491?loc=P_br_r0vq68ygz_D_2aabd0_B_1','event-book-cover.webp']",
            "'靈界事件簿':'https://www.books.com.tw/products/0010709682'": "'靈界事件簿':'https://www.books.com.tw/products/0010882491?loc=P_br_r0vq68ygz_D_2aabd0_B_1'"
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected text not found: {old}')
              text = text.replace(old, new, 1)

          html_path.write_text(text, encoding='utf-8')

          image_b64 = ''''''
          Path('event-book-cover.webp').write_bytes(base64.b64decode(image_b64))
          PY
      - name: Commit changes
        shell: bash
        run: |
          rm -f .github/workflows/update-event-book.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.html event-book-cover.webp .github/workflows/update-event-book.yml
          git commit -m "更新請問鬼怪與靈界事件簿連結及封面"
          git push
