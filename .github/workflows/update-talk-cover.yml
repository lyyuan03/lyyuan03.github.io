name: Update talk book cover
on:
  push:
    branches: [main]
    paths: ['.github/workflows/update-talk-cover.yml']
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace only the talk feature cover
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('books.html')
          text = path.read_text(encoding='utf-8')
          pattern = r"const talkFeatureCover='data:image/webp;base64,[^']*';"
          replacement = "const talkFeatureCover=img+'001/094/42/0010944208.jpg';"
          updated, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected exactly one talkFeatureCover match, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY
          rm -f .github/workflows/update-talk-cover.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.html .github/workflows/update-talk-cover.yml
          git commit -m "更換《我在人間與靈界對話》書封圖"
          git push origin main