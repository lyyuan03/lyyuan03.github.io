name: Fix Guanyin BeClass Anchor

on:
  push:
    paths:
      - '.github/workflows/fix-guanyin-beclass-anchor.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update guanyin event signup anchor
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('guanyin-event-v2.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace(
              '#lamps,\n#form {\n  scroll-margin-top: 24px;\n}',
              '#lamps,\n#form,\n#beclass-form {\n  scroll-margin-top: 84px;\n}'
          )
          s = s.replace(
              '<a class="btn" href="https://ling-yuan-nest.base44.app/guanyin-event" target="_blank" rel="noopener">前往報名</a>',
              '<a class="btn" href="#beclass-form">前往報名</a>'
          )
          s = s.replace(
              '<section class="section narrow beclass-section">',
              '<section class="section narrow beclass-section" id="beclass-form">'
          )

          p.write_text(s, encoding='utf-8')
          Path('.github/workflows/fix-guanyin-beclass-anchor.yml').unlink()
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes needed"
          else
            git add guanyin-event-v2.html .github/workflows/fix-guanyin-beclass-anchor.yml
            git commit -m "Update guanyin signup button anchor"
            git push
          fi
