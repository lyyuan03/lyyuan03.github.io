name: Insert lamp icons

on:
  push:
    paths:
      - '.github/workflows/insert-lamp-icons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert icons into Guanyin event page
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('guanyin-event-v2.html')
          html = path.read_text(encoding='utf-8')
          icon_style = 'width:30px;height:30px;vertical-align:middle;margin-right:10px;object-fit:contain;'
          replacements = {
              '<h3>全方位福運燈</h3>': f'<h3><img src="assets/lamp-icons/baozhu.svg" alt="" aria-hidden="true" style="{icon_style}">全方位福運燈</h3>',
              '<h3>平安消災燈</h3>': f'<h3><img src="assets/lamp-icons/candlelight.svg" alt="" aria-hidden="true" style="{icon_style}">平安消災燈</h3>',
              '<h3>福慧健康燈</h3>': f'<h3><img src="assets/lamp-icons/dharma-wheel.svg" alt="" aria-hidden="true" style="{icon_style}">福慧健康燈</h3>',
              '<h3>財運轉順燈</h3>': f'<h3><img src="assets/lamp-icons/radiance.svg" alt="" aria-hidden="true" style="{icon_style}">財運轉順燈</h3>',
              '<h3>家運守護燈</h3>': f'<h3><img src="assets/lamp-icons/lotus.svg" alt="" aria-hidden="true" style="{icon_style}">家運守護燈</h3>',
          }
          changed = False
          for old, new in replacements.items():
              if old in html:
                  html = html.replace(old, new)
                  changed = True
          if not changed:
              print('No matching lamp headings found; nothing changed.')
              raise SystemExit(0)
          path.write_text(html, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guanyin-event-v2.html
          git commit -m "Insert lamp icons into Guanyin event page"
          git push
