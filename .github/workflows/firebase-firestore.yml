name: Deploy Firebase Firestore

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/firebase-firestore.yml

jobs:
  deploy-firestore:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Firestore database exists
        run: |
          PROJECT_ID="lyyuan03-membership"
          if gcloud firestore databases describe --database="(default)" --project="$PROJECT_ID" >/dev/null 2>&1; then
            echo "Firestore default database already exists."
          else
            gcloud firestore databases create --database="(default)" --location="asia-east1" --type="firestore-native" --project="$PROJECT_ID"
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules,storage --project lyyuan03-membership
