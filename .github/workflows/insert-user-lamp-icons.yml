name: Insert user lamp icons

on:
  push:
    paths:
      - '.github/workflows/insert-user-lamp-icons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  insert-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert icons before lamp titles
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('guanyin-event-v2.html')
          html = path.read_text(encoding='utf-8')
          style = 'width:38px;height:38px;vertical-align:middle;margin-right:10px;object-fit:contain;'
          replacements = {
              '<h3>全方位福運燈</h3>': f'<h3><img src="assets/lamp-icons/user-radiance.svg" alt="" aria-hidden="true" style="{style}">全方位福運燈</h3>',
              '<h3>平安消災燈</h3>': f'<h3><img src="assets/lamp-icons/user-candle.svg" alt="" aria-hidden="true" style="{style}">平安消災燈</h3>',
              '<h3>福慧健康燈</h3>': f'<h3><img src="assets/lamp-icons/user-wheel.svg" alt="" aria-hidden="true" style="{style}">福慧健康燈</h3>',
              '<h3>財運轉順燈</h3>': f'<h3><img src="assets/lamp-icons/user-baozhu.svg" alt="" aria-hidden="true" style="{style}">財運轉順燈</h3>',
              '<h3>家運守護燈</h3>': f'<h3><img src="assets/lamp-icons/user-lotus.svg" alt="" aria-hidden="true" style="{style}">家運守護燈</h3>',
          }
          for old, new in replacements.items():
              html = html.replace(old, new)
          path.write_text(html, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guanyin-event-v2.html
          git commit -m "Insert user lamp icons"
          git push
