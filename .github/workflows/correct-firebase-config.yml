name: Correct Firebase config

on:
  push:
    paths:
      - '.github/workflows/correct-firebase-config.yml'

permissions:
  contents: write

jobs:
  correct-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct Firebase API key character
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          match = re.search(r'(apiKey:\s*")([^"]+)(")', text)
          if not match:
              raise SystemExit('Firebase apiKey field was not found.')
          value = match.group(2)
          marker = '-nP0E'
          if marker not in value:
              raise SystemExit('Expected character sequence was not found.')
          corrected = value.replace(marker, '-nPOE', 1)
          updated = text[:match.start(2)] + corrected + text[match.end(2):]
          path.write_text(updated, encoding='utf-8')
          PY
      - name: Commit corrected config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Correct Firebase API key character"
          git push
