name: Adjust lamp icons to 60px

on:
  push:
    paths:
      - '.github/workflows/adjust-lamp-icons-60px.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make lamp icons larger darker and thicker
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          page = Path('guanyin-event-v2.html')
          html = page.read_text(encoding='utf-8')
          html = html.replace(
              'width:42px;height:42px;vertical-align:middle;margin-right:12px;object-fit:contain;',
              'width:60px;height:60px;vertical-align:middle;margin-right:14px;object-fit:contain;'
          )
          page.write_text(html, encoding='utf-8')

          dark = '#594F47'
          for icon in Path('assets/lamp-icons').glob('*.svg'):
              svg = icon.read_text(encoding='utf-8')
              svg = re.sub(r'fill="#[0-9A-Fa-f]{6}"', f'fill="{dark}"', svg)
              svg = re.sub(r'\s+stroke="#[0-9A-Fa-f]{6}"', '', svg)
              svg = re.sub(r'\s+stroke-width="[^"]*"', '', svg)
              svg = re.sub(r'\s+stroke-linejoin="[^"]*"', '', svg)
              svg = re.sub(r'\s+stroke-linecap="[^"]*"', '', svg)
              svg = svg.replace('<path ', f'<path stroke="{dark}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" ')
              icon.write_text(svg, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guanyin-event-v2.html assets/lamp-icons/*.svg
          git commit -m "Adjust lamp icons to 60px and darker stroke"
          git push
