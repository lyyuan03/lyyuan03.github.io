name: Fix Firebase API key

on:
  push:
    paths:
      - '.github/workflows/fix-firebase-key.yml'

permissions:
  contents: write

jobs:
  fix-key:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Correct Firebase API key
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = 'AIzaSyAgHy-nPOErzs7NDJossVGPTIhenXQfjQY'
          new = 'AIzaSyAgHy-nP0Erzs7NDJossVGPITbenXOfjQY'
          if old not in text:
              raise SystemExit('Old API key was not found; no files changed.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix Firebase API key"
          git push
