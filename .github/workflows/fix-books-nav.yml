name: Disable Wenxuan navigation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-books-nav.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Disable Wenxuan dropdowns
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          files = [
              'index.html',
              'niandian.html',
              'fahui.html',
              'lixing.html',
              'books.html',
              'guanyin-event-v2.html',
              'dizhi.html',
          ]
          disabled = '<li><span aria-disabled="true" style="color:rgba(245,240,232,.32);cursor:default;pointer-events:none">文選</span></li>'
          pattern = re.compile(
              r'<li>\s*<span class="has-dropdown">文選</span>\s*<ul class="dropdown">\s*'
              r'<li><a href="https://kinkiosel\.pixnet\.net/blog/category/1537788" target="_blank">靈修奧義</a></li>\s*'
              r'<li><a href="https://kinkiosel\.pixnet\.net/blog/category/1609797" target="_blank">問事實錄</a></li>\s*'
              r'<li><a href="https://kinkiosel\.pixnet\.net/blog/category/1615684" target="_blank">法會感應</a></li>\s*'
              r'</ul>\s*</li>'
          )

          changed = []
          for name in files:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              updated, count = pattern.subn(disabled, text)
              if count:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(f'{name}: {count}')

          if changed:
              print('Updated Wenxuan nav:')
              print('\n'.join(changed))
          else:
              print('No Wenxuan dropdowns needed changes.')
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Disable Wenxuan navigation
          file_pattern: index.html niandian.html fahui.html lixing.html books.html guanyin-event-v2.html dizhi.html
