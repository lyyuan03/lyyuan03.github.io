name: Fix books timeline links

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-books-nav.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch timeline book links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('books.html')
          s = p.read_text(encoding='utf-8')
          marker = "const works=[['2011',[books.tarotFirst,books.tarotEastWest,books.talk]],['2012',[books.event]],['2013',[books.faith1]],['2014',[books.tarotPro]],['2015',[books.faith2]],['2016',[books.practice1]],['2018',[books.practice2]],['2020',[books.karma,books.w]],['2024',[books.good]],['2025',[books.love1,books.love2,books.ghost]],['2026','future']];"
          insert = marker + "\nconst timelineLinks={'請問財富':'https://www.books.com.tw/products/0011029320?loc=P_0005_033','喚醒天生好命':'https://www.books.com.tw/products/0011003625','請問愛上冊':'https://www.books.com.tw/products/0011022589','請問愛下冊':'https://www.books.com.tw/products/0011022592','請問輪迴':'https://www.books.com.tw/products/0011002849','請問鬼怪':'https://www.books.com.tw/products/0011029318?sloc=main','靈界事件簿':'https://www.books.com.tw/products/0010709682','透視靈驗':'https://www.books.com.tw/products/0010992671','靈視拜拜':'https://www.books.com.tw/products/0011015834','靈修迷藏':'https://www.books.com.tw/products/0010719221','關鍵報告':'https://www.books.com.tw/products/0010784866','我在人間與靈界對話':'https://www.books.com.tw/products/0010944208'};function timelineUrl(b){return timelineLinks[b[0]]||b[1]}"
          if 'const timelineLinks=' not in s:
              s = s.replace(marker, insert)
          s = s.replace('`<a class="era-book" href="${b[1]}" target="_blank"><img src="${b[2]}" alt="${b[0]}"><span>${b[0]}</span></a>`', '`<a class="era-book" href="${timelineUrl(b)}" target="_blank"><img src="${b[2]}" alt="${b[0]}"><span>${b[0]}</span></a>`')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.html
          git diff --cached --quiet && exit 0
          git commit -m "fix books timeline links to books.com.tw"
          git p"ush"
