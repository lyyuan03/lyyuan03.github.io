name: Fix books loading screen

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-books-nav.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch books page
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('books.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('},3000);return}', '},5000);return}')
          s = s.replace('rgba(245,240,232,.55),rgba(165,130,84,.25) 28%,rgba(10,15,8,.96) 72%', 'rgba(245,240,232,.30),rgba(165,130,84,.16) 26%,rgba(10,15,8,.98) 70%')
          s = s.replace('color:rgba(245,240,232,.88);letter-spacing:.12em;animation:textFloat 3.8s ease-in-out infinite', 'color:rgba(255,252,246,.98);letter-spacing:.12em;text-shadow:0 2px 10px rgba(0,0,0,.75);font-weight:500;animation:textFloat 3.8s ease-in-out infinite')
          s = s.replace('.mystic-wait .last{color:#d9b777;text-shadow:0 0 12px rgba(217,183,119,.42)}', '.mystic-wait .last{color:#e8bd72;text-shadow:0 2px 10px rgba(0,0,0,.75),0 0 14px rgba(217,183,119,.55);font-weight:500}')
          s = s.replace('@keyframes textFloat{0%,100%{opacity:.72;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}', '@keyframes textFloat{0%,100%{opacity:.92;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.html
          git diff --cached --quiet && exit 0
          git commit -m "fix books loading readability"
          git p"ush"
