name: Fix books nav links

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-books-nav.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update books page purchase links and UI text
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = 'https://lyyuan.tw/books.html?v=spiritual-books-20260703-refresh'
          purchase = 'https://page.cashier.ecpay.com.tw/forms/b7KC'
          nav_replacements = {
              'href="books.html">宇色靈修著作</a>': f'href="{target}">宇色靈修著作</a>',
              'href="https://lyyuan.tw/books.html?v=no-lotus-text-final">宇色靈修著作</a>': f'href="{target}">宇色靈修著作</a>',
              'href="https://lyyuan.tw/books.html?v=spiritual-books-20260703">宇色靈修著作</a>': f'href="{target}">宇色靈修著作</a>',
          }
          book_urls = [
              'https://www.books.com.tw/products/0011029320?loc=P_0005_033',
              'https://www.books.com.tw/products/0011003625',
              'https://www.books.com.tw/products/0011022589',
              'https://www.books.com.tw/products/0011022592',
              'https://www.books.com.tw/products/0011002849',
              'https://www.books.com.tw/products/0011029318?sloc=main',
              'https://www.books.com.tw/products/0010709682',
              'https://www.books.com.tw/products/0010992671',
              'https://www.books.com.tw/products/0011015834',
              'https://www.books.com.tw/products/0010719221',
              'https://www.books.com.tw/products/0010784866',
              'https://www.books.com.tw/products/0010944208',
          ]
          changed = []
          for p in Path('.').glob('*.html'):
              s = p.read_text(encoding='utf-8')
              ns = s
              for old, new in nav_replacements.items():
                  ns = ns.replace(old, new)
              if p.name == 'books.html':
                  for old in book_urls:
                      ns = ns.replace(old, purchase)
                  ns = ns.replace('前往博客來查看', '前往靈元院購書頁')
              if ns != s:
                  p.write_text(ns, encoding='utf-8')
                  changed.append(str(p))
          print('changed:', changed)
          PY
      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html
          git commit -m "fix(books): send recommendations to LYY purchase page"
          git push
