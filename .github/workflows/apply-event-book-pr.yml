name: Apply event book update
on:
  pull_request_target:
    types: [opened]
permissions:
  contents: write
  pull-requests: write
jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply requested changes
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git fetch origin "$HEAD_REF"
          git show "origin/$HEAD_REF:event-cover.b64" | base64 -d > event-book-cover.webp
          python - <<'PY'
          from pathlib import Path
          p=Path('books.html')
          s=p.read_text(encoding='utf-8')
          changes={
          "ghost:['請問鬼怪','https://page.cashier.ecpay.com.tw/forms/b7KC',img+'001/102/93/0011029318.jpg']":"ghost:['請問鬼怪','https://www.books.com.tw/products/0011029318?sloc=main',img+'001/102/93/0011029318.jpg']",
          "event:['靈界事件簿','https://page.cashier.ecpay.com.tw/forms/b7KC',img+'001/070/96/0010709682.jpg']":"event:['靈界事件簿','https://www.books.com.tw/products/0010882491?loc=P_br_r0vq68ygz_D_2aabd0_B_1','event-book-cover.webp']",
          "'靈界事件簿':'https://www.books.com.tw/products/0010709682'":"'靈界事件簿':'https://www.books.com.tw/products/0010882491?loc=P_br_r0vq68ygz_D_2aabd0_B_1'"
          }
          for old,new in changes.items():
              if old not in s: raise SystemExit('Expected text not found: '+old)
              s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
          rm -f .github/workflows/update-event-book.yml .github/workflows/apply-event-book-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.html event-book-cover.webp .github/workflows
          git commit -m "更新請問鬼怪與靈界事件簿連結及封面"
          git push origin main
