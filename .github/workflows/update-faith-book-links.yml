name: Update faith book links
on:
  push:
    branches: [main]
    paths: ['.github/workflows/update-faith-book-links.yml']
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update only the two requested links
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('books.html')
          s = p.read_text(encoding='utf-8')
          replacements = {
              "faith1:['透視靈驗','https://page.cashier.ecpay.com.tw/forms/b7KC',img+'001/099/26/0010992671.jpg']": "faith1:['透視靈驗','https://www.books.com.tw/products/0010992671?loc=P_br_r0vq68ygz_D_2aabd0_B_1',img+'001/099/26/0010992671.jpg']",
              "faith2:['靈視拜拜','https://page.cashier.ecpay.com.tw/forms/b7KC',img+'001/101/58/0011015834.jpg']": "faith2:['靈視拜拜','https://www.books.com.tw/products/0011015834?loc=P_br_r0vq68ygz_D_2aabd0_B_1',img+'001/101/58/0011015834.jpg']",
              "'透視靈驗':'https://www.books.com.tw/products/0010992671'": "'透視靈驗':'https://www.books.com.tw/products/0010992671?loc=P_br_r0vq68ygz_D_2aabd0_B_1'",
              "'靈視拜拜':'https://www.books.com.tw/products/0011015834'": "'靈視拜拜':'https://www.books.com.tw/products/0011015834?loc=P_br_r0vq68ygz_D_2aabd0_B_1'"
          }
          for old, new in replacements.items():
              if old not in s:
                  raise SystemExit(f'Expected text not found: {old}')
              s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')
          PY
          rm -f .github/workflows/update-faith-book-links.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.html .github/workflows/update-faith-book-links.yml
          git commit -m "更新透視靈驗與靈視拜拜購書連結"
          git push
