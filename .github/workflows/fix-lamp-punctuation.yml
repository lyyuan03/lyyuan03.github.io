name: Fix lamp punctuation

on:
  push:
    paths:
      - '.github/workflows/fix-lamp-punctuation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-text:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('guanyin-event-v2.html')
          html = path.read_text(encoding='utf-8')
          html = html.replace('身體安康。智慧增長。福慧雙修。', '身體安康，智慧增長，福慧雙修。')
          path.write_text(html, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guanyin-event-v2.html
          git commit -m "Fix lamp punctuation"
          git push
