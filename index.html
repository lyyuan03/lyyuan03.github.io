<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈元院 | Ling Yuan Yuan</title>
<meta name="description" content="靈元院——靈性修持與內在整合空間">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F6F3ED;
  --text:#1C1C1C;
  --muted:#6B6B6B;
  --line:#D8D2C8;
  --moss:#7A8B6F;
  --accent:#A58254;
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.9;
  letter-spacing:0.04em;
}

.container{max-width:960px;margin:0 auto;padding:0 24px;}

nav{
  position:fixed;top:0;left:0;right:0;
  background:rgba(246,243,237,0.9);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(10px);
}
nav ul{display:flex;justify-content:center;gap:28px;list-style:none;padding:14px 0;}
nav a{color:var(--muted);text-decoration:none;font-size:14px;}
nav a:hover{color:var(--accent);}

.hero{
  min-height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
}
.hero h1{
  font-family:var(--serif);
  font-size:42px;
  font-weight:400;
  margin-bottom:12px;
}
.hero p{color:var(--muted);margin-bottom:24px;}
.hero .links a{
  margin:0 10px;
  color:var(--text);
  text-decoration:none;
  border-bottom:1px solid var(--line);
}

.news{padding:80px 0;}
.news h2{
  font-family:var(--serif);
  font-size:24px;
  margin-bottom:20px;
}
.news-item{
  padding:16px 0;
  border-bottom:1px solid var(--line);
}
.news-item span{color:var(--muted);font-size:13px;}

.about{
  padding:80px 0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.about h2{
  font-family:var(--serif);
  font-size:22px;
  margin-bottom:12px;
}
.about p{color:var(--muted);}

footer{
  padding:60px 0;
  text-align:center;
  color:var(--muted);
  border-top:1px solid var(--line);
}

@media(max-width:768px){
  .about{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav>
  <ul>
    <li><a href="#">首頁</a></li>
    <li><a href="#news">最新消息</a></li>
    <li><a href="#about">關於靈元院</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>靈元院</h1>
  <p>靜觀內在 · 回歸本源</p>
  <div class="links">
    <a href="#news">最新消息</a>
    <a href="#about">理念</a>
  </div>
</section>

<section id="news" class="news container">
  <h2>最新消息</h2>
  <div class="news-item">
    觀音法會開放報名 <span>2026</span>
  </div>
  <div class="news-item">
    靈修課程更新 <span>2026</span>
  </div>
  <div class="news-item">
    法會紀實公告 <span>2026</span>
  </div>
</section>

<section id="about" class="about container">
  <div>
    <h2>理念</h2>
    <p>以靜觀與內在整合為核心，回到存在的本質。</p>
  </div>
  <div>
    <h2>實踐</h2>
    <p>透過修持、覺察與生活化練習，回歸清明心性。</p>
  </div>
</section>

<footer>
  © 靈元院 Ling Yuan Yuan
</footer>

</body>
</html>
